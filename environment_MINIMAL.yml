name: pangenome-env
# Environnement pan-génome minimal
# Outils : FastQC, Trimmomatic, SPAdes, QUAST, BLAST, Prokka, Roary, enrichR
# Kernels : Python + Bash + R

channels:
  - bioconda
  - conda-forge
  - defaults

channel_priority: flexible

dependencies:
  # ============================================================================
  # JUPYTER ET KERNELS
  # ============================================================================
  - jupyterlab>=3.6,<5
  - jupyterhub>=3.0,<5
  - jupyter-resource-usage
  - notebook
  - nodejs>=18
  - ipykernel
  - ipywidgets>=8.0
  
  # ============================================================================
  # PYTHON SCIENTIFIQUE
  # ============================================================================
  - python=3.11
  - pip>=24.0
  - numpy>=1.24
  - pandas>=2.0
  - scipy>=1.10
  - matplotlib>=3.7
  - seaborn>=0.12
  - biopython>=1.81
  - pysam>=0.21
  - scikit-learn>=1.3
  - plotly>=5.0
  
  # ============================================================================
  # R + PACKAGES + KERNEL JUPYTER
  # ============================================================================
  # R de base
  - r-base=4.3
  
  # Kernel R pour Jupyter
  - r-irkernel
  - r-essentials
  
  # Packages R essentiels
  - r-tidyverse
  - r-ggplot2
  - r-readr
  - r-dplyr
  - r-tidyr
  - r-stringr
  - r-httr
  - r-jsonlite
  
  # enrichR sera installé via R (dans postBuild)
  
  # ============================================================================
  # OUTILS BIOINFORMATIQUES
  # ============================================================================
  
  # Contrôle qualité
  - fastqc
  - multiqc
  - qualimap
  
  # Trimming
  - fastp
  - trimmomatic
  
  # Mapping/SAM
  - bwa
  - bwa-mem2
  - samtools
  - htslib
  
  # Assemblage
  - spades
  
  # Qualité assemblage
  - quast
  
  # Identification
  - blast
  - mlst
  
  # Annotation
  - prokka
  - bakta
  
  # Pan-génome
  - roary
  
  # Outils support
  - hmmer
  - muscle
  - cd-hit
  - bbmap
  
  # Perl (pour Prokka/Roary)
  - perl
  - perl-bioperl
  - perl-xml-simple
  - perl-digest-md5
  
  # ============================================================================
  # INSTALLATIONS VIA PIP
  # ============================================================================
  - pip:
    - bash_kernel
    - cyvcf2
    - watermark
