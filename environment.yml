name: pangenome-env
# Environnement pan-génome minimal CORRIGÉ
# Outils : FastQC, Trimmomatic, SPAdes, QUAST, BLAST, Prokka, Roary, enrichR
# Kernels : Python + Bash (SANS kernel R)
# BAKTA RETIRÉ (conflit Perl avec Roary)

channels:
  - conda-forge
  - bioconda
  - defaults

channel_priority: flexible

dependencies:
  # ============================================================================
  # JUPYTER ET KERNELS
  # ============================================================================
  - jupyterlab>=3.6,<5
  - jupyterhub>=3.0,<5
  - jupyter-resource-usage
  - notebook
  - nodejs>=18
  - ipykernel
  - ipywidgets>=8.0
  
  # ============================================================================
  # PYTHON SCIENTIFIQUE
  # ============================================================================
  - python=3.11
  - pip>=24.0
  - numpy>=1.24
  - pandas>=2.0
  - scipy>=1.10
  - matplotlib>=3.7
  - seaborn>=0.12
  - biopython>=1.81
  - pysam>=0.21
  - scikit-learn>=1.3
  - plotly>=5.0
  
  # ============================================================================
  # R + PACKAGES (SANS KERNEL JUPYTER)
  # ============================================================================
  - r-base=4.3
  - r-tidyverse
  - r-ggplot2
  - r-readr
  - r-dplyr
  - r-tidyr
  - r-stringr
  - r-httr
  - r-jsonlite
  
  # ============================================================================
  # OUTILS BIOINFORMATIQUES - VERSIONS COMPATIBLES
  # ============================================================================
  
  # Contrôle qualité
  - fastqc
  - multiqc
  
  # Trimming
  - trimmomatic
  
  # Mapping/SAM
  - bwa
  - samtools
  - htslib
  
  # Assemblage
  - spades
  
  # Qualité assemblage
  - quast
  
  # Identification
  - blast
  - mlst
  
  # Annotation (Prokka SEULEMENT, pas Bakta)
  - prokka
  
  # Pan-génome
  - roary
  
  # Outils support
  - hmmer
  - cd-hit
  
  # Perl (version compatible Roary + Prokka + QUAST)
  - perl
  - perl-bioperl
  
  # ============================================================================
  # INSTALLATIONS VIA PIP
  # ============================================================================
  - pip:
    - bash_kernel
    - cyvcf2
    - watermark
