name: pangenome-env
# VERSION CORRIGÉE - Avec MLST
# Trimmomatic via apt, MLST via conda

channels:
  - conda-forge
  - bioconda
  - defaults

channel_priority: flexible

dependencies:
  # ============================================================================
  # JUPYTER - MINIMAL
  # ============================================================================
  - jupyterlab>=3.6,<5
  - notebook
  - ipykernel
  
  # ============================================================================
  # PYTHON - BASE
  # ============================================================================
  - python=3.11
  - pip
  
  # ============================================================================
  # R - BASE
  # ============================================================================
  - r-base=4.3
  
  # ============================================================================
  # MLST - Seul outil bioinformatique dans conda
  # (car pas disponible dans apt)
  # ============================================================================
  - mlst
  
  # ============================================================================
  # PIP PACKAGES
  # ============================================================================
  - pip:
    - bash_kernel
